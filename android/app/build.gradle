    //   Windows: WSL é‚¨وھژç½°ç¸؛ï؟½Eï؟½Eï؟½Eï؟½ linux64-bin/hermesc ç¹§è²‍ن»–ç¸؛ï؟½Eï؟½Eï؟½Eï؟½èœپEï؟½Eï؟½ï؟½Eï؟½ç¸؛هگ¶خ›ç¹‌ï؟½Eمƒ»ï؟½Eï؟½Eï؟½Eï؟½مƒ»ï؟½Eï؟½Eï؟½Eï؟½ç¹‌ï½¼ç¹§ه‰پEï؟½Eï؟½ï؟½Eï؟½ï؟½Eï؟½Eï؟½Eï؟½é€•ï½¨
