        // keystore.properties ç¸؛ï؟½Eï؟½Eï؟½Eï؟½ Git é‚‚ï½،é€پEï؟½Eï؟½Eمƒ»ï؟½Eï؟½Eï؟½Eï؟½مƒ»ï؟½Eï؟½Eï؟½Eï؟½ç¸؛ï؟½Eï؟½Eï؟½Eï؟½ç¸؛هگ¶ï؟½Eï؟½Eï؟½Eï؟½ç¸؛è–™ï؟½E
