            } else {
                // keystore.properties ç¸؛ه¾Œï؟½Eç¸؛مƒ»مƒ»ï؟½Eï؟½Eï؟½Eï؟½مƒ»ï؟½Eï؟½Eï؟½Eï؟½èœ·èŒ¨ï؟½Eï؟½Eï؟½Eï؟½ï؟½Eï؟½Eï؟½Eï؟½E debug ç¹§ï؟½Eï؟½Eï؟½Eï؟½ç¹‌ï½¼ç¸؛ï؟½Eï؟½Eï؟½Eï؟½ç¹‌è¼”مپ‹ç¹‌ï½¼ç¹‌ï½«ç¹‌ï؟½Eمƒ£ç¹§ï؟½Eï؟½Eï؟½Eï؟½
                storeFile file('debug.keystore')
