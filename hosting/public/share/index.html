<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yorimichi — メモを共有</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: #333;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.1);
    padding: 40px 32px;
    max-width: 380px;
    width: 90%;
    text-align: center;
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  p  { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.5; }
  .btn {
    display: inline-block;
    background: #4CAF50;
    color: #fff;
    text-decoration: none;
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    transition: background .2s;
  }
  .btn:hover { background: #43A047; }
  .sub { font-size: 12px; color: #999; margin-top: 20px; }
  .sub a { color: #4CAF50; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🗺️</div>
  <h1>Yorimichi</h1>
  <p>共有メモを受け取るにはアプリが必要です。<br>下のボタンからアプリを開くか、インストールしてください。</p>
  <a id="open" class="btn" href="#">アプリを開く</a>
  <p class="sub">
    アプリが開かない場合は
    <a id="store" href="https://play.google.com/apps/testing/com.ktakahashi.yorimichi">Google Play からインストール</a>
  </p>
</div>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var shareId = params.get('id');
  if (!shareId) return;

  var deepLink = 'yorimichi://open?shareId=' + encodeURIComponent(shareId);
  var storeUrl = 'https://play.google.com/apps/testing/com.ktakahashi.yorimichi';

  // ボタンとリンクを設定
  document.getElementById('open').href = deepLink;
  document.getElementById('store').href = storeUrl;

  // 自動でアプリを開く試行
  var start = Date.now();
  window.location.href = deepLink;

  // 2秒後にまだこのページにいればストアへ
  setTimeout(function () {
    if (document.hidden || Date.now() - start > 3000) return;
    window.location.href = storeUrl;
  }, 2000);
})();
</script>
</body>
</html>
